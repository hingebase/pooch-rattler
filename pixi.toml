[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]
preview = ["pixi-build"]
requires-pixi = ">=0.63.0"

[package.build.backend]
name = "pixi-build-python"
version = ">=0.4.4"
channels = ["conda-forge"]

[package.build.config]
ignore-pypi-mapping = true

[package.host-dependencies]
uv = ">=0.11.0,<0.12.0"

[package.run-dependencies]
pooch = ">=1.9.0,<2.0.0"
py-rattler = ">=0.23.1,<2.0.0"
typing-extensions = ">=4.14.0,<5.0.0"

[package.target.unix.run-dependencies]  # tombi: lint.rules.key-not-allowed.disabled = true
uvloop = ">=0.22.1,<2.0.0"

[package.target.win.run-dependencies]  # tombi: lint.rules.key-not-allowed.disabled = true
winloop = ">=0.3.1,<2.0.0"

[dependencies]
basedpyright = ">=1.38.3"
jinja2 = ">=3.1.6"
pooch-rattler = { path = "." }
pyrefly = ">=0.57.1"
pytest = ">=8.4.2"
tqdm = ">=4.67.2"
ty = ">=0.0.24"
types-tqdm = ">=4.67.2"

[pypi-dependencies]
bustapi = ">=0.9.2"

[environments]
# conda-forge has dropped support for Python 3.9
# Testing the minimum and maximum Python versions
default = ["py310"]
py314 = ["py314"]

[feature.py310.dependencies]
python-gil = "3.10.*"
ruff = ">=0.15.7"

[feature.py310.tasks]
ruff = "ruff check"

[feature.py314.dependencies]
python-gil = "3.14.*"

[tasks]
basedpyright = "basedpyright"
pyrefly = "pyrefly check"
pytest = "pytest"
ty = "ty check"
test = [
    { task = "basedpyright", environment = "default" },
    { task = "pyrefly", environment = "default" },
    { task = "pytest", environment = "default" },
    { task = "ruff", environment = "default" },
    { task = "ty", environment = "default" },
    { task = "basedpyright", environment = "py314" },
    { task = "pyrefly", environment = "py314" },
    { task = "pytest", environment = "py314" },
    { task = "ty", environment = "py314" },
]
